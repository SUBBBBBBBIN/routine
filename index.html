<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="나의 루틴">
<meta name="theme-color" content="#0e0e0f">
<title>나의 루틴</title>
<link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjogIlx1YjA5OFx1Yzc1OCBcdWI4ZThcdWQyZjQiLCAic2hvcnRfbmFtZSI6ICJcdWI4ZThcdWQyZjQiLCAic3RhcnRfdXJsIjogIi4iLCAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwgImJhY2tncm91bmRfY29sb3IiOiAiIzBlMGUwZiIsICJ0aGVtZV9jb2xvciI6ICIjMGUwZTBmIn0=">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0f; --surface:#18181a; --surface2:#222225; --border:#2e2e32;
  --text:#f0efe8; --muted:#787870; --radius:12px;
  --c0:#8b7cf8; --c1:#3ecf8e; --c2:#f97316; --c3:#38bdf8; --c4:#f472b6; --c5:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:420px;margin:0 auto;padding:28px 20px 100px}

/* Header */
.header{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between}
.date-line{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:6px}
.title-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.app-title{font-size:22px;font-weight:500;letter-spacing:-.02em;cursor:pointer}
.subtitle{font-size:12px;color:var(--muted)}
.edit-mode-btn{background:none;border:0.5px solid var(--border);color:var(--muted);font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;white-space:nowrap;margin-top:4px}
.edit-mode-btn.active{border-color:#3ecf8e;color:#3ecf8e}
.edit-mode-btn:hover{color:var(--text);border-color:var(--muted)}

/* Streak */
.streak-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:14px 16px;background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border)}
.streak-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:#3ecf8e;line-height:1;min-width:48px}
.streak-label{font-size:13px;color:var(--muted);line-height:1.5}
.streak-label strong{color:var(--text);font-weight:500;display:block;font-size:14px}
.week-dots{display:flex;gap:5px;margin-left:auto}
.wdot{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.wdot.today{border-color:#3ecf8e;color:#3ecf8e}
.wdot.full{background:#3ecf8e;border-color:#3ecf8e;color:#0e0e0f;font-weight:500}

/* Section */
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:22px}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);display:flex;align-items:center;gap:6px;flex:1}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--border)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.section-add-btn{background:none;border:0.5px solid var(--border);color:var(--muted);font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;flex-shrink:0}
.section-add-btn:hover{color:var(--text);border-color:var(--muted)}

/* Habit card */
.habit{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s}
.habit.checkable{cursor:pointer}
.habit.checkable:active{transform:scale(.98)}
.habit.done{opacity:.7}
.circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;cursor:pointer}
.htext{flex:1;min-width:0}
.hname{font-size:14px;font-weight:400;line-height:1.4}
.habit.done .hname{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border)}
.hdesc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}

/* Edit mode controls */
.habit-actions{display:none;gap:6px;flex-shrink:0}
.edit-mode .habit-actions{display:flex}
.edit-mode .circle{display:none}
.hab-btn{background:none;border:0.5px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.hab-btn:hover{color:var(--text);border-color:var(--muted)}
.hab-btn.del{border-color:#7a360a44;color:#f97316}
.hab-btn.del:hover{background:#1f1510;border-color:var(--c2)}

/* Ring */
.ring-wrap{display:flex;justify-content:center;margin:24px 0 0}
.ring-label{text-align:center;font-size:12px;color:var(--muted);margin-top:10px}
svg.ring{overflow:visible}
.rtrack{fill:none;stroke:var(--surface2);stroke-width:6}
.rfill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.rnum{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;fill:var(--text);text-anchor:middle;dominant-baseline:central}
.rsub{font-family:'Noto Sans KR',sans-serif;font-size:10px;fill:var(--muted);text-anchor:middle;dominant-baseline:central}

/* Calendar */
.cal-title{font-size:14px;font-weight:500;margin-bottom:12px;margin-top:32px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.ch{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center;padding-bottom:4px;letter-spacing:.05em}
.cd{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted)}
.cd.today-cal{color:var(--text);border:0.5px solid var(--border)}
.cd.full{background:#3ecf8e;color:#0e0e0f;font-weight:500}
.cd.partial{background:#0f2820;color:var(--text);border:0.5px solid #3ecf8e44}
.cd.future{opacity:.2}
.cd.empty{opacity:0;pointer-events:none}

/* Bottom */
.bottom{margin-top:36px;text-align:center;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.bot-btn{background:none;border:0.5px solid var(--border);color:var(--muted);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:8px 16px;border-radius:20px;cursor:pointer;transition:all .2s}
.bot-btn:hover{color:var(--text);border-color:var(--muted)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:0.5px solid var(--border);border-radius:20px 20px 0 0;padding:24px 24px 40px;width:100%;max-width:480px;transform:translateY(30px);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:500;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.minput{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
.minput:focus{border-color:#3ecf8e}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.color-swatch.selected{border-color:var(--text);transform:scale(1.15)}
.modal-btns{display:flex;gap:8px;margin-top:20px}
.mbtn{flex:1;padding:12px;border-radius:10px;font-size:14px;cursor:pointer;border:0.5px solid var(--border);font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.mbtn.cancel{background:none;color:var(--muted)}
.mbtn.ok{background:#3ecf8e;border-color:#3ecf8e;color:#0e0e0f;font-weight:500}
.mbtn.danger{background:none;border-color:#7a360a44;color:#f97316}

/* iOS guide */
.ios-guide{background:var(--surface);border:0.5px solid #3ecf8e44;border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;font-size:12px;color:var(--muted);line-height:1.8;position:relative;display:none}
.ios-guide strong{color:var(--text);font-weight:500;display:block;margin-bottom:4px;font-size:13px}
</style>
</head>
<body>
<div class="app" id="app">

  <div id="ios-guide" class="ios-guide">
    <strong>홈 화면에 앱으로 추가 (아이폰)</strong>
    하단 공유(□↑) → 홈 화면에 추가 → 추가
    <span style="position:absolute;top:12px;right:14px;cursor:pointer;color:var(--muted)" onclick="dismissIOS()">✕</span>
  </div>

  <div class="header">
    <div>
      <div class="date-line" id="date-line"></div>
      <div class="title-wrap">
        <div class="app-title" id="app-title" onclick="openModal('name')">나의 루틴</div>
      </div>
      <div class="subtitle">작아서 실패할 수 없는 습관들</div>
    </div>
    <button class="edit-mode-btn" id="edit-btn" onclick="toggleEditMode()">편집</button>
  </div>

  <div class="streak-row">
    <div><div class="streak-num" id="snum">0</div></div>
    <div class="streak-label"><strong id="stext">연속 0일</strong>오늘도 하나씩</div>
    <div class="week-dots" id="wdots"></div>
  </div>

  <div id="habits-container"></div>

  <div class="ring-wrap" id="ring-wrap">
    <div>
      <svg class="ring" width="100" height="100" viewBox="0 0 100 100">
        <circle class="rtrack" cx="50" cy="50" r="38"/>
        <circle class="rfill" id="rfill" cx="50" cy="50" r="38"
          stroke="#3ecf8e" stroke-dasharray="238.76" stroke-dashoffset="238.76"
          transform="rotate(-90 50 50)"/>
        <text class="rnum" id="rnum" x="50" y="46">0/0</text>
        <text class="rsub" x="50" y="62">오늘</text>
      </svg>
      <div class="ring-label" id="rmsg">오늘의 루틴을 시작해봐</div>
    </div>
  </div>

  <div class="cal-title">이번 달 기록</div>
  <div class="cal-grid" id="calgrid"></div>

  <div class="bottom">
    <button class="bot-btn" onclick="openModal('addCat')">+ 카테고리 추가</button>
    <button class="bot-btn" onclick="confirmReset()">오늘 기록 초기화</button>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title">편집</div>
    <div id="modal-body"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<script>
const DAYS=['일','월','화','수','목','금','토'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const COLORS=['#8b7cf8','#3ecf8e','#f97316','#38bdf8','#f472b6','#facc15','#a78bfa','#34d399'];
const DONE_BG={'#8b7cf8':'#1a1730','#3ecf8e':'#0f2820','#f97316':'#1f1510','#38bdf8':'#0c1f2e','#f472b6':'#2a1020','#facc15':'#1f1a08','#a78bfa':'#1a1730','#34d399':'#0a2018'};

// Default data
const DEFAULT_DATA = {
  appName: '나의 루틴',
  categories: [
    { id:'cat0', name:'수면', color:'#8b7cf8', habits:[
      { id:'h0', name:'자정에 폰 내려놓기', desc:'눕는 게 목표. 잠 못 자도 OK.' }
    ]},
    { id:'cat1', name:'공부', color:'#3ecf8e', habits:[
      { id:'h1', name:'모션그래픽 유튜브 한 편 보기', desc:'10분도 OK. 켜는 게 전부.' },
      { id:'h2', name:'포폴 작업 20분 하기', desc:'타이머 켜고 20분. 그게 다야.' }
    ]},
    { id:'cat2', name:'다이어트', color:'#f97316', habits:[
      { id:'h3', name:'단 간식 안 먹기', desc:'밥은 OK. 간식만 참으면 됨.' }
    ]}
  ]
};

function getConfig() {
  try { return JSON.parse(localStorage.getItem('routine_config')) || DEFAULT_DATA; } catch { return DEFAULT_DATA; }
}
function saveConfig(c) { try { localStorage.setItem('routine_config', JSON.stringify(c)); } catch {} }
function getStore() { try { return JSON.parse(localStorage.getItem('routine_data') || '{}'); } catch { return {}; } }
function setStore(d) { try { localStorage.setItem('routine_data', JSON.stringify(d)); } catch {} }
function todayKey() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function uid() { return 'h' + Date.now() + Math.random().toString(36).slice(2,5); }

let config = getConfig();
let editMode = false;
let modalCtx = null;

function getTodayChecked() {
  const store = getStore();
  return store[todayKey()] || {};
}
function saveTodayChecked(checked) {
  const store = getStore();
  store[todayKey()] = checked;
  setStore(store);
}

function allHabits() {
  return config.categories.flatMap(c => c.habits);
}

function toggle(hid) {
  if (editMode) return;
  const checked = getTodayChecked();
  checked[hid] = !checked[hid];
  saveTodayChecked(checked);
  render();
}

function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('edit-btn').textContent = editMode ? '완료' : '편집';
  document.getElementById('edit-btn').classList.toggle('active', editMode);
  document.getElementById('app').classList.toggle('edit-mode', editMode);
  render();
}

// ── Modal system ──
function openModal(type, payload) {
  modalCtx = { type, payload };
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  const btns = document.getElementById('modal-btns');
  body.innerHTML = ''; btns.innerHTML = '';

  if (type === 'name') {
    title.textContent = '앱 이름 변경';
    body.innerHTML = `<div class="field"><label>이름</label><input class="minput" id="mi-name" maxlength="20" value="${config.appName}"></div>`;
    btns.innerHTML = `<button class="mbtn cancel" onclick="closeModal()">취소</button><button class="mbtn ok" onclick="saveModal()">저장</button>`;
    setTimeout(()=>document.getElementById('mi-name').focus(),100);

  } else if (type === 'addCat') {
    title.textContent = '카테고리 추가';
    body.innerHTML = `
      <div class="field"><label>카테고리 이름</label><input class="minput" id="mi-cname" maxlength="12" placeholder="예: 운동"></div>
      <div class="field"><label>색상</label><div class="color-row" id="color-row">${COLORS.map((c,i)=>`<div class="color-swatch${i===1?' selected':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('')}</div></div>`;
    btns.innerHTML = `<button class="mbtn cancel" onclick="closeModal()">취소</button><button class="mbtn ok" onclick="saveModal()">추가</button>`;
    setTimeout(()=>document.getElementById('mi-cname').focus(),100);

  } else if (type === 'editCat') {
    const cat = config.categories.find(c=>c.id===payload);
    title.textContent = '카테고리 편집';
    body.innerHTML = `
      <div class="field"><label>이름</label><input class="minput" id="mi-cname" maxlength="12" value="${cat.name}"></div>
      <div class="field"><label>색상</label><div class="color-row" id="color-row">${COLORS.map(c=>`<div class="color-swatch${c===cat.color?' selected':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('')}</div></div>`;
    btns.innerHTML = `<button class="mbtn danger" onclick="deleteCat('${payload}')">삭제</button><button class="mbtn cancel" onclick="closeModal()">취소</button><button class="mbtn ok" onclick="saveModal()">저장</button>`;

  } else if (type === 'addHabit') {
    title.textContent = '습관 추가';
    body.innerHTML = `
      <div class="field"><label>습관 이름</label><input class="minput" id="mi-hname" maxlength="30" placeholder="예: 물 2L 마시기"></div>
      <div class="field"><label>설명 (선택)</label><input class="minput" id="mi-hdesc" maxlength="40" placeholder="짧게"></div>`;
    btns.innerHTML = `<button class="mbtn cancel" onclick="closeModal()">취소</button><button class="mbtn ok" onclick="saveModal()">추가</button>`;
    setTimeout(()=>document.getElementById('mi-hname').focus(),100);

  } else if (type === 'editHabit') {
    const {catId, hid} = payload;
    const cat = config.categories.find(c=>c.id===catId);
    const h = cat.habits.find(h=>h.id===hid);
    title.textContent = '습관 편집';
    body.innerHTML = `
      <div class="field"><label>습관 이름</label><input class="minput" id="mi-hname" maxlength="30" value="${h.name}"></div>
      <div class="field"><label>설명</label><input class="minput" id="mi-hdesc" maxlength="40" value="${h.desc||''}"></div>`;
    btns.innerHTML = `<button class="mbtn danger" onclick="deleteHabit('${catId}','${hid}')">삭제</button><button class="mbtn cancel" onclick="closeModal()">취소</button><button class="mbtn ok" onclick="saveModal()">저장</button>`;
  }

  document.getElementById('overlay').classList.add('show');
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); modalCtx=null; }
function closeModalOutside(e) { if(e.target===document.getElementById('overlay')) closeModal(); }

let selectedColor = COLORS[1];
function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
}

function saveModal() {
  const {type, payload} = modalCtx;
  if (type === 'name') {
    const v = document.getElementById('mi-name').value.trim();
    if (v) { config.appName = v; saveConfig(config); }

  } else if (type === 'addCat') {
    const name = document.getElementById('mi-cname').value.trim();
    if (!name) return;
    const color = document.querySelector('.color-swatch.selected')?.style.background || COLORS[0];
    config.categories.push({ id: uid(), name, color, habits: [] });
    saveConfig(config);

  } else if (type === 'editCat') {
    const cat = config.categories.find(c=>c.id===payload);
    const name = document.getElementById('mi-cname').value.trim();
    if (!name) return;
    cat.name = name;
    cat.color = document.querySelector('.color-swatch.selected')?.style.background || cat.color;
    saveConfig(config);

  } else if (type === 'addHabit') {
    const name = document.getElementById('mi-hname').value.trim();
    if (!name) return;
    const desc = document.getElementById('mi-hdesc').value.trim();
    const cat = config.categories.find(c=>c.id===payload);
    cat.habits.push({ id: uid(), name, desc });
    saveConfig(config);

  } else if (type === 'editHabit') {
    const {catId, hid} = payload;
    const cat = config.categories.find(c=>c.id===catId);
    const h = cat.habits.find(h=>h.id===hid);
    const name = document.getElementById('mi-hname').value.trim();
    if (!name) return;
    h.name = name;
    h.desc = document.getElementById('mi-hdesc').value.trim();
    saveConfig(config);
  }
  closeModal();
  render();
}

function deleteCat(catId) {
  if (!confirm('카테고리와 하위 습관을 모두 삭제할까?')) return;
  config.categories = config.categories.filter(c=>c.id!==catId);
  saveConfig(config); closeModal(); render();
}
function deleteHabit(catId, hid) {
  if (!confirm('이 습관을 삭제할까?')) return;
  const cat = config.categories.find(c=>c.id===catId);
  cat.habits = cat.habits.filter(h=>h.id!==hid);
  saveConfig(config); closeModal(); render();
}

// ── Render ──
function render() {
  config = getConfig();
  const now = new Date();
  document.getElementById('date-line').textContent = `${now.getFullYear()} / ${MONTHS[now.getMonth()]} / ${DAYS[now.getDay()]}요일`;
  document.getElementById('app-title').textContent = config.appName;
  document.title = config.appName;

  const checked = getTodayChecked();
  const total = allHabits().length;
  const done = allHabits().filter(h=>checked[h.id]).length;

  // Habits
  const container = document.getElementById('habits-container');
  container.innerHTML = '';
  config.categories.forEach(cat => {
    // Section header
    const sh = document.createElement('div');
    sh.className = 'section-header';
    sh.innerHTML = `
      <div class="section-label">
        <div class="sdot" style="background:${cat.color}"></div>${cat.name}
      </div>
      ${editMode ? `<button class="section-add-btn" onclick="openModal('addHabit','${cat.id}')">+ 습관 추가</button>
      <button class="section-add-btn" onclick="openModal('editCat','${cat.id}')">편집</button>` : ''}`;
    container.appendChild(sh);

    // Habits
    cat.habits.forEach(h => {
      const isDone = !!checked[h.id];
      const div = document.createElement('div');
      div.className = 'habit' + (editMode ? '' : ' checkable') + (isDone && !editMode ? ' done' : '');
      if (isDone && !editMode) div.style.background = DONE_BG[cat.color] || '#0f2820';
      if (!editMode) div.onclick = () => toggle(h.id);

      div.innerHTML = `
        <div class="circle${isDone ? ' done' : ''}" style="${isDone ? `background:${cat.color};border-color:${cat.color}` : ''}">${isDone ? '✓' : ''}</div>
        <div class="htext">
          <div class="hname">${h.name}</div>
          ${h.desc ? `<div class="hdesc">${h.desc}</div>` : ''}
        </div>
        <div class="habit-actions">
          <button class="hab-btn" onclick="openModal('editHabit',{catId:'${cat.id}',hid:'${h.id}'})">편집</button>
          <button class="hab-btn del" onclick="deleteHabit('${cat.id}','${h.id}')">삭제</button>
        </div>`;
      container.appendChild(div);
    });
  });

  // Ring
  const circ = 238.76;
  document.getElementById('rfill').setAttribute('stroke-dashoffset', total ? circ*(1-done/total) : circ);
  document.getElementById('rnum').textContent = `${done}/${total}`;
  const msgs = total === 0 ? ['습관을 추가해봐'] :
    done === 0 ? ['오늘의 루틴을 시작해봐'] :
    done === total ? ['오늘 완벽해 ✓'] :
    done >= total*0.75 ? ['하나만 더!'] :
    done >= total*0.5 ? ['절반 왔어. 조금만 더.'] :
    ['잘 하고 있어. 계속!'];
  document.getElementById('rmsg').textContent = msgs[0];

  // Streak
  const store = getStore();
  let streak = 0;
  const todayDone = total > 0 && done === total;
  const chk = new Date();
  if (!todayDone) chk.setDate(chk.getDate()-1);
  for (let i=0; i<365; i++) {
    const k = `${chk.getFullYear()}-${String(chk.getMonth()+1).padStart(2,'0')}-${String(chk.getDate()).padStart(2,'0')}`;
    const d = store[k];
    const ids = allHabits().map(h=>h.id);
    if (d && ids.length > 0 && ids.every(id=>d[id])) { streak++; chk.setDate(chk.getDate()-1); }
    else break;
  }
  if (todayDone) streak = Math.max(streak, 1);
  document.getElementById('snum').textContent = streak;
  document.getElementById('stext').textContent = `연속 ${streak}일`;

  // Week dots
  const we = document.getElementById('wdots');
  we.innerHTML = '';
  for (let i=6; i>=0; i--) {
    const d2 = new Date(); d2.setDate(d2.getDate()-i);
    const k2 = `${d2.getFullYear()}-${String(d2.getMonth()+1).padStart(2,'0')}-${String(d2.getDate()).padStart(2,'0')}`;
    const dayChecked = i===0 ? checked : (store[k2]||{});
    const ids = allHabits().map(h=>h.id);
    const full = ids.length > 0 && ids.every(id=>dayChecked[id]);
    const div = document.createElement('div');
    div.className = 'wdot'+(i===0?' today':'')+(full?' full':'');
    div.textContent = DAYS[d2.getDay()];
    we.appendChild(div);
  }

  renderCal();
}

function renderCal() {
  const store = getStore();
  const now = new Date();
  const year=now.getFullYear(), month=now.getMonth(), today=now.getDate();
  const firstDay=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate();
  const g=document.getElementById('calgrid'); g.innerHTML='';
  DAYS.forEach(d=>{const h=document.createElement('div');h.className='ch';h.textContent=d;g.appendChild(h)});
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cd empty';g.appendChild(e)}
  const ids = allHabits().map(h=>h.id);
  for(let d=1;d<=dim;d++){
    const k=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayChecked = d===today ? getTodayChecked() : (store[k]||{});
    const div=document.createElement('div');div.className='cd';div.textContent=d;
    if(d>today) div.classList.add('future');
    else if(d===today){
      div.classList.add('today-cal');
      if(ids.length>0&&ids.every(id=>dayChecked[id]))div.classList.add('full');
      else if(ids.some(id=>dayChecked[id]))div.classList.add('partial');
    } else {
      if(ids.length>0&&ids.every(id=>dayChecked[id]))div.classList.add('full');
      else if(ids.some(id=>dayChecked[id]))div.classList.add('partial');
    }
    g.appendChild(div);
  }
}

function confirmReset(){if(confirm('오늘 기록을 초기화할까?')){saveTodayChecked({});render()}}

// iOS
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
if(isIOS&&!window.navigator.standalone&&!localStorage.getItem('ios_dismissed')){
  document.getElementById('ios-guide').style.display='block';
}
function dismissIOS(){localStorage.setItem('ios_dismissed','1');document.getElementById('ios-guide').style.display='none'}

// Enter key in modals
document.addEventListener('keydown', e=>{if(e.key==='Enter'&&modalCtx)saveModal()});

render();
</script>
